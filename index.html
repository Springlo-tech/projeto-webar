<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Filtro Philips AR</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; }

        model-viewer {
            width: 100%;
            /* Ajustado para 80% da altura da tela para resolver a "tela pequena" */
            height: 80vh; 
            background-color: #fcfcfc;
            --poster-color: transparent;
        }

        /* Ajuste fino da imagem de carregamento (Poster) */
        model-viewer::part(poster) {
            background-size: contain; /* Faz a imagem caber sem sobrar bordas brancas */
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Botão de AR customizado */
        #ar-button {
            background-color: white;
            border-radius: 8px;
            border: 1px solid #ccc;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: 0.3s;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #ar-button:hover {
            background: #f9f9f9;
            transform: translateX(-50%) scale(1.05);
        }

        /* Mensagem de status durante o rastreamento do chão */
        #ar-prompt {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }

        model-viewer[ar-status="session-started"] #ar-prompt {
            display: block;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="./modelos/filtro.glb" 
        poster="./imagens/target.png"
        alt="Modelo 3D de um filtro de água Philips"
        
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-scale="fixed"
        ar-placement="floor"
        
        camera-controls
        auto-rotate
        shadow-intensity="1.5"
        shadow-softness="1"
        environment-image="neutral"
        exposure="1"
        
        /* Ajustes para evitar o objeto "flutuando" */
        bounds="tight"
        interaction-prompt="auto"
    >

        <button slot="ar-button" id="ar-button">
            👋 Ver na minha casaxxx (AR)
        </button>

        <div id="ar-prompt">
            Mova o celular devagar para detectar o chão...
        </div>

        <div slot="ar-status" style="display:none;">
            </div>

    </model-viewer>

</body>
</html>
