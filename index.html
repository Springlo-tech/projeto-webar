<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<model-viewer 
  src="./modelos/filtro.glb" 
  ios-src="./modelos/filtro.usdz"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-scale="auto"
  ar-placement="floor"
  camera-controls
  touch-action="pan-y"
  poster="./imagens/target.png"
  shadow-intensity="1"
  alt="Um modelo 3D em realidade aumentada">
  
  <button slot="ar-button" id="ar-button" style="background-color: white; border-radius: 8px; border: 1px solid #ccc; position: absolute; top: 16px; right: 16px; padding: 12px; z-index: 999;">
    👋 Ver na minha casa
  </button>

  <div id="ar-prompt">
    <img src="https://modelviewer.dev/shared/assets/hand.png" alt="Guia de movimento da mão">
  </div>
</model-viewer>

<style>
  /* Garante que o visualizador ocupe um espaço visível */
  model-viewer {
    width: 100%;
    height: 500px;
    background-color: #f0f0f0;
  }
  
  /* Esconde o botão se o dispositivo não suportar AR */
  model-viewer:not([ar-status="not-present"]) #ar-button {
    display: block;
  }
  
  model-viewer[ar-status="not-present"] #ar-button {
    display: none;
  }
</style>
