<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
model-viewer {
  width: 100%;
  height: 500px;
  background-color: #f0f0f0;
}

/* botão AR */
#ar-button{
  background-color:white;
  border-radius:8px;
  border:1px solid #ccc;
  position:absolute;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 4px 6px rgba(0,0,0,0.1);
  transition:0.2s;
}

#ar-button:hover{
  background:#f5f5f5;
}
</style>

<model-viewer 
  src="./modelos/filtro.glb" 
  
  poster="./imagens/target.png"
  alt="Um modelo 3D de um filtro de água"

  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-scale="fixed"
  ar-placement="floor"
  environment-image="neutral"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  shadow-softness="0.5"
  exposure="1"
  disable-zoom
>

<button slot="ar-button" id="ar-button">
👋 Ver na minha casa (AR)
</button>

<div slot="ar-status">
Colocando o objeto no seu espaço...
</div>

</model-viewer>
