<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
  /* Garante que o visualizador ocupe espaço na tela */
  model-viewer {
    width: 100%;
    height: 500px;
    background-color: #f0f0f0;
  }
</style>

<model-viewer 
  src="./modelos/filtro.glb" 
  ios-src="./modelos/filtro.usdz"
  poster="./imagens/target.png"
  alt="Um modelo 3D de um filtro de água"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-scale="fixed" 
  scale="1 1 1"
  camera-controls
  auto-rotate
  shadow-intensity="1">
  
  <button slot="ar-button" id="ar-button" style="background-color: white; border-radius: 8px; border: 1px solid #ccc; position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); padding: 12px 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    👋 Ver na minha casa- versao6 (AR)
  </button>
  

  <div slot="ar-status" id="ar-status">
    Colocando o objeto no seu espaço...
  </div>
</model-viewer>
